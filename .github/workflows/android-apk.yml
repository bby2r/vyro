name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: npm ci

      - name: Run mobile tests
        run: npm test -- --ci

      - name: Expo prebuild (generate android/)
        run: npx expo prebuild --platform android --no-install --clean

      - name: Gradle assembleRelease
        working-directory: mobile/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Locate and rename APK
        id: apk
        working-directory: mobile
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="vyro-v${APP_VERSION}-build${{ github.run_number }}-${SHORT_SHA}"
          RENAMED_PATH="android/app/build/outputs/apk/release/${ARTIFACT_NAME}.apk"
          mv "$APK_PATH" "$RENAMED_PATH"
          echo "path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: mobile/${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30
